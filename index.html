<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta
    name="description"
    content="518 local creator. Socials, updates, and contact links in one place."
  />
  <title>Kyle.518 | Bio Card</title>

  <style>
    :root {
      --bg: #050505;
      --bg-soft: #111113;
      --card: rgba(16, 16, 18, 0.78);
      --card-strong: rgba(24, 24, 27, 0.86);
      --border: rgba(255, 255, 255, 0.1);
      --border-strong: rgba(255, 255, 255, 0.16);
      --text: #ffffff;
      --muted: #b8b8c0;
      --muted-soft: #7c7c86;
      --accent: #f13232;
      --accent-deep: #8f1212;
      --accent-soft: rgba(241, 50, 50, 0.14);
      --shadow: 0 32px 90px rgba(0, 0, 0, 0.66);
      --red-glow: 0 0 36px rgba(241, 50, 50, 0.2);
      --focus-ring: rgba(241, 50, 50, 0.36);
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: var(--bg);
    }

    body {
      margin: 0;
      min-height: 100vh;
      overflow-x: hidden;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(241, 50, 50, 0.18), transparent 32rem),
        radial-gradient(circle at bottom right, rgba(143, 18, 18, 0.22), transparent 28rem),
        linear-gradient(145deg, #030303 0%, #0c0c0f 46%, #050505 100%);
      color: var(--text);
    }

    body::before {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      content: "";
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.55), transparent 72%);
    }

    .animated-background {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      pointer-events: none;
      isolation: isolate;
    }

    .animated-background::before,
    .animated-background::after,
    .smoke-layer {
      position: absolute;
      content: "";
      pointer-events: none;
    }

    .animated-background::before {
      inset: -18% -12%;
      background:
        radial-gradient(circle at 18% 20%, rgba(183, 230, 255, 0.08), transparent 22rem),
        radial-gradient(circle at 78% 76%, rgba(241, 50, 50, 0.08), transparent 24rem),
        radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.035), transparent 32rem);
      filter: blur(28px);
      opacity: 0.78;
      animation: smokeDrift 28s ease-in-out infinite alternate;
    }

    .animated-background::after {
      inset: 0;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.018) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.014) 1px, transparent 1px);
      background-size: 34px 34px;
      mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.62), transparent 82%);
      opacity: 0.72;
    }

    .smoke-layer {
      inset: -10rem;
      z-index: -1;
      background:
        radial-gradient(ellipse at 12% 72%, rgba(255, 255, 255, 0.075), transparent 24rem),
        radial-gradient(ellipse at 84% 26%, rgba(132, 170, 190, 0.075), transparent 26rem),
        radial-gradient(ellipse at 52% 88%, rgba(255, 255, 255, 0.04), transparent 30rem);
      filter: blur(34px);
      opacity: 0.6;
      transform: translate3d(0, 0, 0);
      animation: smokeDrift 34s linear infinite alternate-reverse;
    }

    .ghost-flyer,
    .pixel-gun,
    .bullet-streak,
    .tag-518,
    .particle {
      position: absolute;
      user-select: none;
      will-change: transform, opacity;
    }

    .ghost-flyer {
      --ghost-size: 118px;
      width: var(--ghost-size);
      height: calc(var(--ghost-size) * 1.28);
      opacity: 0.62;
      filter:
        drop-shadow(0 0 12px rgba(215, 246, 255, 0.36))
        drop-shadow(0 0 34px rgba(171, 226, 255, 0.22))
        blur(0.15px);
      transform: translate3d(-18vw, 0, 0);
      animation: ghostFlyLeftToRight 31s linear infinite;
    }

    .ghost-flyer::before {
      position: absolute;
      inset: 0 4% 3%;
      content: "";
      background:
        radial-gradient(ellipse at 37% 34%, rgba(221, 250, 255, 0.5) 0 8%, rgba(21, 31, 36, 0.76) 8.8% 14%, transparent 15%),
        radial-gradient(ellipse at 62% 34%, rgba(221, 250, 255, 0.46) 0 8%, rgba(19, 29, 34, 0.78) 8.8% 14%, transparent 15%),
        radial-gradient(ellipse at 51% 53%, rgba(232, 252, 255, 0.46) 0 10%, rgba(22, 32, 36, 0.82) 11% 20%, transparent 21%),
        radial-gradient(ellipse at 50% 42%, rgba(0, 0, 0, 0.68) 0 33%, transparent 44%),
        radial-gradient(ellipse at 42% 23%, rgba(255, 255, 255, 0.92), rgba(213, 247, 255, 0.5) 18%, transparent 30%),
        radial-gradient(ellipse at 18% 57%, rgba(235, 253, 255, 0.62), rgba(166, 224, 238, 0.24) 22%, transparent 42%),
        radial-gradient(ellipse at 84% 59%, rgba(235, 253, 255, 0.54), rgba(166, 224, 238, 0.2) 22%, transparent 43%),
        linear-gradient(100deg, transparent 17%, rgba(255, 255, 255, 0.28) 26%, transparent 34%),
        linear-gradient(78deg, transparent 51%, rgba(255, 255, 255, 0.24) 59%, transparent 68%),
        linear-gradient(164deg, rgba(248, 254, 255, 0.74), rgba(188, 238, 248, 0.4) 42%, rgba(240, 254, 255, 0.18) 72%, rgba(255, 255, 255, 0.05));
      border: 1px solid rgba(229, 251, 255, 0.32);
      border-radius: 48% 48% 31% 30% / 33% 33% 17% 17%;
      clip-path: polygon(
        50% 0%, 61% 4%, 72% 13%, 80% 29%, 84% 50%, 100% 62%, 91% 72%,
        82% 70%, 74% 84%, 65% 75%, 58% 96%, 50% 82%, 40% 100%, 33% 80%,
        24% 91%, 18% 73%, 7% 78%, 0% 65%, 16% 51%, 20% 29%, 29% 13%, 39% 4%
      );
      box-shadow:
        inset 10px 4px 15px rgba(255, 255, 255, 0.42),
        inset -11px -6px 18px rgba(95, 165, 183, 0.18),
        inset 0 -24px 26px rgba(255, 255, 255, 0.18),
        0 0 24px rgba(210, 247, 255, 0.38),
        0 0 58px rgba(157, 221, 238, 0.18);
      backdrop-filter: blur(3px);
      animation: ghostFloat 6.8s ease-in-out infinite;
    }

    .ghost-flyer::after {
      position: absolute;
      inset: -28% -34%;
      content: "";
      background:
        radial-gradient(ellipse at 48% 42%, rgba(222, 251, 255, 0.24), transparent 36%),
        radial-gradient(ellipse at 25% 58%, rgba(197, 241, 250, 0.2), transparent 25%),
        radial-gradient(ellipse at 76% 57%, rgba(197, 241, 250, 0.16), transparent 27%),
        conic-gradient(from 35deg at 50% 52%, transparent 0 12%, rgba(210, 247, 255, 0.12) 18%, transparent 28% 42%, rgba(210, 247, 255, 0.11) 50%, transparent 61% 100%);
      border-radius: 999px;
      filter: blur(14px);
      opacity: 0.94;
      animation: ghostFloat 8.4s ease-in-out infinite reverse;
    }

    .ghost-flyer.one {
      --ghost-size: 148px;
      top: 9%;
      left: -18vw;
      opacity: 0.68;
      animation-duration: 34s;
      animation-delay: -7s;
    }

    .ghost-flyer.two {
      --ghost-size: 112px;
      top: 57%;
      right: -20vw;
      opacity: 0.5;
      transform: translate3d(18vw, 0, 0) scaleX(-1);
      animation-name: ghostFlyRightToLeft;
      animation-duration: 39s;
      animation-delay: -18s;
    }

    .ghost-flyer.three {
      --ghost-size: 92px;
      top: 28%;
      left: -22vw;
      opacity: 0.42;
      animation-duration: 45s;
      animation-delay: -27s;
    }

    .tag-518 {
      color: rgba(255, 255, 255, 0.055);
      font-size: clamp(4.2rem, 18vw, 10.5rem);
      font-weight: 900;
      letter-spacing: -0.12em;
      text-shadow: 0 0 40px rgba(241, 50, 50, 0.08);
      animation: floatTag 22s ease-in-out infinite alternate;
    }

    .tag-518-one {
      top: 5%;
      right: -1.5rem;
    }

    .tag-518-two {
      bottom: 4%;
      left: -1.25rem;
      font-size: clamp(3.8rem, 15vw, 8.5rem);
      animation-delay: -9s;
      animation-direction: alternate-reverse;
    }

    .pixel-gun {
      --sprite-scale: 1;
      width: 178px;
      height: 76px;
      opacity: 0.5;
      image-rendering: pixelated;
      transform: translate3d(-18vw, 0, 0) scale(var(--sprite-scale));
      animation: pixelGunFly 20s linear infinite;
    }

    .pixel-gun::before,
    .pixel-gun::after {
      position: absolute;
      content: "";
      image-rendering: pixelated;
    }

    .pixel-gun.one {
      --sprite-scale: 0.82;
      top: 20%;
      left: -24vw;
      opacity: 0.58;
      animation-duration: 18s;
      animation-delay: -3s;
    }

    .pixel-gun.two {
      --sprite-scale: 0.68;
      top: 73%;
      left: -26vw;
      opacity: 0.4;
      animation-duration: 25s;
      animation-delay: -14s;
    }

    .pixel-gun.three {
      --sprite-scale: 0.58;
      top: 43%;
      left: -28vw;
      opacity: 0.33;
      animation-duration: 31s;
      animation-delay: -22s;
    }

    .bullet-streak {
      width: 20px;
      height: 4px;
      background: linear-gradient(90deg, rgba(255, 244, 184, 0), rgba(255, 244, 184, 0.9), rgba(255, 75, 44, 0.52));
      box-shadow: 0 0 12px rgba(255, 230, 120, 0.32);
      opacity: 0;
      image-rendering: pixelated;
      animation: bulletShoot 4.8s linear infinite;
    }

    .bullet-streak.one {
      top: 24%;
      left: 28%;
      animation-delay: -1.2s;
    }

    .bullet-streak.two {
      top: 74%;
      left: 42%;
      opacity: 0;
      animation-delay: -3.7s;
      animation-duration: 5.6s;
    }

    .bullet-streak.three {
      top: 45%;
      left: 18%;
      width: 16px;
      animation-delay: -4.8s;
      animation-duration: 6.2s;
    }

    .particle {
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: rgba(241, 50, 50, 0.35);
      box-shadow: 0 0 18px rgba(241, 50, 50, 0.42);
      animation: riseParticle 13s linear infinite;
    }

    .particle-one {
      left: 20%;
      bottom: -1rem;
    }

    .particle-two {
      right: 28%;
      bottom: -1rem;
      width: 4px;
      height: 4px;
      animation-delay: -5s;
      animation-duration: 15s;
    }

    .particle-three {
      left: 72%;
      bottom: -1rem;
      width: 5px;
      height: 5px;
      animation-delay: -9s;
      animation-duration: 17s;
    }

    .page {
      position: relative;
      z-index: 1;
      display: flex;
      width: 100%;
      min-height: 100vh;
      align-items: center;
      justify-content: center;
      padding: 34px 18px;
    }

    .card {
      width: min(100%, 440px);
      padding: 30px;
      overflow: hidden;
      text-align: center;
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.075), rgba(255, 255, 255, 0.025)),
        var(--card);
      border: 1px solid var(--border);
      border-radius: 34px;
      box-shadow: var(--shadow), var(--red-glow), inset 0 1px 0 rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(22px);
    }

    .card::before {
      display: block;
      width: 112px;
      height: 3px;
      margin: 0 auto 25px;
      content: "";
      background: linear-gradient(90deg, transparent, rgba(241, 50, 50, 0.9), transparent);
      border-radius: 999px;
      box-shadow: 0 0 18px rgba(241, 50, 50, 0.38);
    }

    .profile {
      display: grid;
      justify-items: center;
      gap: 12px;
    }

    .avatar {
      display: flex;
      width: 92px;
      height: 92px;
      align-items: center;
      justify-content: center;
      margin-bottom: 4px;
      color: var(--text);
      font-size: 25px;
      font-weight: 900;
      letter-spacing: -0.05em;
      background:
        linear-gradient(145deg, rgba(241, 50, 50, 0.2), rgba(255, 255, 255, 0.06)),
        var(--card-strong);
      border: 1px solid var(--border-strong);
      border-radius: 50%;
      box-shadow: 0 0 0 7px rgba(241, 50, 50, 0.04), 0 0 32px rgba(241, 50, 50, 0.18);
    }

    h1 {
      margin: 0;
      font-size: clamp(2.45rem, 12vw, 3.75rem);
      line-height: 0.92;
      letter-spacing: -0.09em;
      text-transform: uppercase;
    }

    .subheading {
      margin: 0;
      color: var(--accent);
      font-size: 0.83rem;
      font-weight: 800;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .bio {
      max-width: 30ch;
      margin: 18px auto 24px;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.65;
    }

    .links {
      display: grid;
      gap: 13px;
      margin-top: 4px;
    }

    .link {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      min-height: 58px;
      padding: 16px 18px;
      overflow: hidden;
      color: var(--text);
      text-align: left;
      text-decoration: none;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.085), rgba(255, 255, 255, 0.026)),
        rgba(255, 255, 255, 0.035);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.07), 0 14px 26px rgba(0, 0, 0, 0.22);
      transition: transform 0.22s ease, border-color 0.22s ease, background 0.22s ease, box-shadow 0.22s ease;
    }

    .link::before {
      position: absolute;
      inset: 0;
      content: "";
      background: radial-gradient(circle at 18% 0%, rgba(241, 50, 50, 0.22), transparent 38%);
      opacity: 0;
      transition: opacity 0.22s ease;
    }

    .link::after {
      z-index: 1;
      flex: 0 0 auto;
      width: 28px;
      height: 28px;
      color: var(--accent);
      font-size: 1.25rem;
      line-height: 26px;
      text-align: center;
      content: "›";
      background: var(--accent-soft);
      border: 1px solid rgba(241, 50, 50, 0.22);
      border-radius: 50%;
      box-shadow: 0 0 20px rgba(241, 50, 50, 0.12);
      transition: transform 0.22s ease, background 0.22s ease;
    }

    .link span {
      position: relative;
      z-index: 1;
      font-size: 0.98rem;
      font-weight: 800;
      letter-spacing: -0.01em;
    }

    .link:hover,
    .link:focus-visible {
      background:
        linear-gradient(135deg, rgba(241, 50, 50, 0.16), rgba(255, 255, 255, 0.045)),
        rgba(255, 255, 255, 0.055);
      border-color: rgba(241, 50, 50, 0.44);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.1), 0 18px 32px rgba(0, 0, 0, 0.28), 0 0 28px rgba(241, 50, 50, 0.12);
      transform: translateY(-2px);
    }

    .link:hover::before,
    .link:focus-visible::before {
      opacity: 1;
    }

    .link:hover::after,
    .link:focus-visible::after {
      background: rgba(241, 50, 50, 0.18);
      transform: translateX(2px);
    }

    .link:focus-visible {
      outline: 3px solid var(--focus-ring);
      outline-offset: 3px;
    }

    .footer {
      margin: 24px 0 0;
      color: var(--muted-soft);
      font-size: 0.78rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    @keyframes smokeDrift {
      from {
        transform: translate3d(-2rem, -1rem, 0) scale(1);
      }

      to {
        transform: translate3d(4rem, 2.5rem, 0) scale(1.08);
      }
    }

    @keyframes ghostFlyLeftToRight {
      0% {
        transform: translate3d(-18vw, 0, 0) rotate(-4deg) scale(0.96);
      }

      50% {
        transform: translate3d(52vw, -3vh, 0) rotate(3deg) scale(1.02);
      }

      100% {
        transform: translate3d(118vw, 2vh, 0) rotate(-2deg) scale(0.98);
      }
    }

    @keyframes ghostFlyRightToLeft {
      0% {
        transform: translate3d(18vw, 0, 0) rotate(3deg) scaleX(-1) scale(0.92);
      }

      50% {
        transform: translate3d(-52vw, 3vh, 0) rotate(-3deg) scaleX(-1) scale(1.02);
      }

      100% {
        transform: translate3d(-118vw, -2vh, 0) rotate(2deg) scaleX(-1) scale(0.94);
      }
    }

    @keyframes ghostFloat {
      0%,
      100% {
        transform: translate3d(0, 0, 0) rotate(-1.5deg);
      }

      50% {
        transform: translate3d(0.25rem, -1.15rem, 0) rotate(1.5deg);
      }
    }

    @keyframes pixelGunFly {
      0% {
        transform: translate3d(-18vw, 0, 0) scale(var(--sprite-scale));
      }

      48% {
        transform: translate3d(50vw, -1.2rem, 0) scale(var(--sprite-scale));
      }

      100% {
        transform: translate3d(118vw, 0.7rem, 0) scale(var(--sprite-scale));
      }
    }

    @keyframes bulletShoot {
      0%,
      44% {
        opacity: 0;
        transform: translate3d(0, 0, 0) scaleX(0.4);
      }

      46% {
        opacity: 0.42;
        transform: translate3d(0, 0, 0) scaleX(1);
      }

      53% {
        opacity: 0.28;
      }

      62%,
      100% {
        opacity: 0;
        transform: translate3d(42vw, 0, 0) scaleX(0.65);
      }
    }

    @keyframes floatTag {
      from {
        transform: translate3d(0, 0, 0) rotate(-3deg);
      }

      to {
        transform: translate3d(-1.4rem, 1.1rem, 0) rotate(2deg);
      }
    }

    @keyframes riseParticle {
      0% {
        opacity: 0;
        transform: translate3d(0, 0, 0);
      }

      16% {
        opacity: 0.42;
      }

      100% {
        opacity: 0;
        transform: translate3d(1.6rem, -105vh, 0);
      }
    }

    @media (max-width: 480px) {
      .page {
        align-items: flex-start;
        padding: 22px 14px;
      }

      .card {
        padding: 24px 18px 22px;
        border-radius: 28px;
      }

      .avatar {

        border-radius: 18px;
      }

      .ghost-flyer {
        --ghost-size: 72px;
      }

      .pixel-gun {
        opacity: 0.2;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        scroll-behavior: auto !important;
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
